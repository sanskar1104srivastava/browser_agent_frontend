<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice AI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26; --border: rgba(255,255,255,0.07);
    --text: #f0f0f5; --text-muted: rgba(240,240,245,0.45); --text-dim: rgba(240,240,245,0.25);
    --accent: #7c6af7; --accent-soft: rgba(124,106,247,0.15);
    --teal: #2dd4bf; --teal-soft: rgba(45,212,191,0.1);
    --red: #f87171; --red-soft: rgba(248,113,113,0.12);
    --green: #4ade80; --green-soft: rgba(74,222,128,0.1);
    --amber: #fbbf24; --amber-soft: rgba(251,191,36,0.1);
    --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; overflow: hidden; position: relative; }
  .bg-orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
  .bg-orb-1 { width: 500px; height: 500px; background: rgba(124,106,247,0.08); top: -150px; left: -100px; }
  .bg-orb-2 { width: 400px; height: 400px; background: rgba(45,212,191,0.05); bottom: -100px; right: -80px; }

  /* ── layout ── */
  .layout { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; width: 100%; max-width: 960px; gap: 0; }
  .container { display: flex; flex-direction: column; align-items: center; gap: 2rem; width: 100%; max-width: 400px; transition: transform 0.5s cubic-bezier(0.4,0,0.2,1), margin 0.5s cubic-bezier(0.4,0,0.2,1); }
  .layout.panel-open .container { transform: translateX(-40px); margin-right: 24px; }

  /* ── result panel ── */
  .result-panel {
    width: 0; min-width: 0; overflow: hidden;
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    display: flex; flex-direction: column; opacity: 0;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.4s ease, min-width 0.5s cubic-bezier(0.4,0,0.2,1);
    position: relative; flex-shrink: 0;
    max-height: 85vh;
  }
  .layout.panel-open .result-panel { width: 360px; min-width: 360px; opacity: 1; }
  .result-panel::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(124,106,247,0.4), transparent); }

  .panel-header { display: flex; align-items: center; justify-content: space-between; padding: 0.85rem 1rem 0.7rem; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .panel-title { display: flex; align-items: center; gap: 8px; font-size: 11px; font-family: var(--mono); letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
  .panel-title-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse-dot 2s ease-in-out infinite; }
  .panel-header-right { display: flex; align-items: center; gap: 8px; }
  .panel-status { font-size: 10px; font-family: var(--mono); padding: 3px 10px; border-radius: 100px; letter-spacing: 0.05em; transition: all 0.3s; white-space: nowrap; }
  .panel-status.searching { background: var(--teal-soft); color: var(--teal); }
  .panel-status.done      { background: var(--green-soft); color: var(--green); }
  .panel-status.idle      { background: rgba(255,255,255,0.05); color: var(--text-muted); }
  .panel-close { width: 22px; height: 22px; border-radius: 50%; background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: background 0.2s, color 0.2s; flex-shrink: 0; }
  .panel-close:hover { background: var(--red-soft); color: var(--red); border-color: rgba(248,113,113,0.2); }

  /* ── panel body ── */
  .panel-body { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 14px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.08) transparent; }
  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

  /* ── searching indicator ── */
  .searching-indicator { display: flex; align-items: center; gap: 10px; padding: 1.5rem 0; }
  .searching-indicator.hidden { display: none; }
  .s-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); animation: sDot 1.2s ease-in-out infinite; }
  .s-dot:nth-child(2) { animation-delay: 0.2s; }
  .s-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes sDot { 0%,100%{opacity:0.3;transform:scale(0.7);}50%{opacity:1;transform:scale(1);} }
  .s-text { font-size: 13px; color: var(--text-muted); font-family: var(--mono); }

  /* ── result card ── */
  .result-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; animation: cardIn 0.45s cubic-bezier(0.4,0,0.2,1) forwards; opacity: 0; }
  @keyframes cardIn { from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);} }

  /* title block */
  .rc-title-block { padding: 1rem 1rem 0.75rem; border-bottom: 1px solid var(--border); }
  .rc-title { font-size: 16px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .rc-title-icon { width: 22px; height: 22px; border-radius: 8px; background: var(--accent-soft); display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; color: var(--accent); }

  /* intro prose */
  .rc-intro { padding: 0.75rem 1rem; font-size: 13px; line-height: 1.65; color: var(--text-muted); border-bottom: 1px solid var(--border); }

  /* sections */
  .rc-section { }
  .rc-section-heading { padding: 0.55rem 1rem 0.3rem; font-size: 10px; font-family: var(--mono); letter-spacing: 0.09em; text-transform: uppercase; color: var(--accent); opacity: 0.8; }
  .rc-point { display: flex; align-items: baseline; justify-content: space-between; padding: 0.45rem 1rem; border-top: 1px solid rgba(255,255,255,0.04); gap: 10px; transition: background 0.15s; }
  .rc-point:hover { background: rgba(255,255,255,0.025); }
  .rc-point-label { font-size: 12px; color: var(--text-muted); flex-shrink: 0; min-width: 80px; }
  .rc-point-value { font-size: 13px; color: var(--text); text-align: right; font-weight: 500; }

  /* note */
  .rc-note { padding: 0.5rem 1rem 0.75rem; font-size: 11px; color: var(--text-dim); font-style: italic; border-top: 1px solid var(--border); }

  /* ── empty state ── */
  .panel-empty { text-align: center; padding: 2rem 1rem; }
  .panel-empty-icon { font-size: 28px; margin-bottom: 0.5rem; opacity: 0.3; }
  .panel-empty-text { font-size: 12px; font-family: var(--mono); color: var(--text-muted); opacity: 0.6; }

  /* ── transcript ── */
  .transcript-box { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; min-height: 100px; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .transcript-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(124,106,247,0.3), transparent); }
  .transcript-feed { flex: 1; overflow-y: auto; padding: 0.85rem 1.25rem; display: flex; flex-direction: column; gap: 6px; max-height: 130px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.06) transparent; }
  .transcript-feed::-webkit-scrollbar { width: 3px; }
  .transcript-feed::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 3px; }
  .transcript-line { font-size: 13px; line-height: 1.6; display: flex; gap: 6px; animation: feedIn 0.2s ease forwards; opacity: 0; }
  .transcript-line.partial .tl-text { color: var(--text-muted); font-style: italic; }
  .transcript-line.final .tl-text { color: var(--text); font-style: normal; }
  .transcript-line .tl-role { font-size: 10px; font-family: var(--mono); letter-spacing: 0.06em; text-transform: uppercase; flex-shrink: 0; padding-top: 3px; }
  .transcript-line.user .tl-role { color: var(--teal); }
  .transcript-line.agent .tl-role { color: var(--accent); }
  .transcript-placeholder { font-size: 13px; color: var(--text-muted); font-style: italic; padding: 0.85rem 1.25rem; }
  @keyframes feedIn { from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);} }

  /* ── orb ── */
  .header { text-align: center; }
  .header-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--accent-soft); border: 1px solid rgba(124,106,247,0.25); border-radius: 100px; padding: 4px 14px; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse-dot 2s ease-in-out infinite; }
  @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.8);} }
  .header h1 { font-size: 2rem; font-weight: 300; letter-spacing: -0.02em; }
  .header h1 span { font-weight: 500; background: linear-gradient(135deg, #7c6af7, #2dd4bf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .header p { font-size: 13px; color: var(--text-muted); margin-top: 0.5rem; }
  .orb-wrapper { position: relative; width: 200px; height: 200px; display: flex; align-items: center; justify-content: center; }
  .orb-ring { position: absolute; border-radius: 50%; border: 1px solid; animation: ring-expand 3s ease-in-out infinite; opacity: 0; }
  .orb-ring-1{width:200px;height:200px;border-color:rgba(124,106,247,0.15);}
  .orb-ring-2{width:200px;height:200px;border-color:rgba(124,106,247,0.1);animation-delay:1s;}
  .orb-ring-3{width:200px;height:200px;border-color:rgba(124,106,247,0.05);animation-delay:2s;}
  @keyframes ring-expand{0%{transform:scale(0.85);opacity:0.8;}100%{transform:scale(1.4);opacity:0;}}
  .orb{position:relative;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#9585fa,#5b49d4,#2a1f7a);box-shadow:0 0 40px rgba(124,106,247,0.3),0 0 80px rgba(124,106,247,0.1),inset 0 1px 0 rgba(255,255,255,0.15);transition:transform 0.3s ease,box-shadow 0.3s ease;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .orb::before{content:'';position:absolute;top:12px;left:20px;width:30px;height:20px;background:rgba(255,255,255,0.12);border-radius:50%;filter:blur(6px);}
  .orb.idle{animation:orb-breathe 4s ease-in-out infinite;}
  .orb.connecting{animation:orb-breathe 1.5s ease-in-out infinite;}
  @keyframes orb-breathe{0%,100%{transform:scale(1);box-shadow:0 0 40px rgba(124,106,247,0.3),0 0 80px rgba(124,106,247,0.1),inset 0 1px 0 rgba(255,255,255,0.15);}50%{transform:scale(1.04);box-shadow:0 0 60px rgba(124,106,247,0.4),0 0 100px rgba(124,106,247,0.15),inset 0 1px 0 rgba(255,255,255,0.15);}}
  .orb.listening{animation:orb-listen 1s ease-in-out infinite;background:radial-gradient(circle at 35% 35%,#5ee8d6,#1a9e8e,#0a4f47);box-shadow:0 0 50px rgba(45,212,191,0.5),0 0 100px rgba(45,212,191,0.2),inset 0 1px 0 rgba(255,255,255,0.2);}
  @keyframes orb-listen{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
  .orb.speaking{animation:orb-speak 0.6s ease-in-out infinite alternate;background:radial-gradient(circle at 35% 35%,#9585fa,#5b49d4,#2a1f7a);box-shadow:0 0 60px rgba(124,106,247,0.6),0 0 120px rgba(124,106,247,0.25),inset 0 1px 0 rgba(255,255,255,0.2);}
  @keyframes orb-speak{0%{transform:scale(1) scaleX(1);}100%{transform:scale(1.08) scaleX(0.96);}}
  .orb.thinking{animation:orb-think 2s linear infinite;background:conic-gradient(from 0deg,#7c6af7,#2dd4bf,#f472b6,#7c6af7);box-shadow:0 0 50px rgba(124,106,247,0.4),0 0 100px rgba(45,212,191,0.15),inset 0 1px 0 rgba(255,255,255,0.15);}
  @keyframes orb-think{0%{filter:hue-rotate(0deg);}100%{filter:hue-rotate(360deg);}}
  .orb-waves{position:absolute;display:flex;align-items:center;gap:4px;}
  .wave-bar{width:3px;border-radius:10px;background:rgba(255,255,255,0.7);animation:wave-anim 1.2s ease-in-out infinite;}
  .wave-bar:nth-child(1){height:10px;}.wave-bar:nth-child(2){height:18px;animation-delay:.15s;}.wave-bar:nth-child(3){height:26px;animation-delay:.3s;}.wave-bar:nth-child(4){height:18px;animation-delay:.45s;}.wave-bar:nth-child(5){height:10px;animation-delay:.6s;}
  @keyframes wave-anim{0%,100%{transform:scaleY(0.4);opacity:0.5;}50%{transform:scaleY(1);opacity:1;}}
  .orb:not(.speaking) .orb-waves{display:none;}.orb.speaking .orb-waves{display:flex;}
  .orb-icon{position:absolute;display:flex;flex-direction:column;align-items:center;gap:3px;}
  .orb.speaking .orb-icon,.orb.thinking .orb-icon{display:none;}
  .mic-body{width:14px;height:20px;background:rgba(255,255,255,0.85);border-radius:7px;}
  .mic-stand-arc{width:18px;height:10px;border:2px solid rgba(255,255,255,0.7);border-bottom:none;border-radius:9px 9px 0 0;margin:2px auto 0;}
  .mic-stand-line{width:2px;height:5px;background:rgba(255,255,255,0.7);margin:0 auto;}
  .mic-stand-base{width:10px;height:2px;background:rgba(255,255,255,0.7);border-radius:1px;margin:0 auto;}
  .think-dots{display:flex;gap:5px;position:absolute;}
  .think-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.8);animation:think-bounce 1.2s ease-in-out infinite;}
  .think-dot:nth-child(2){animation-delay:.2s;}.think-dot:nth-child(3){animation-delay:.4s;}
  @keyframes think-bounce{0%,80%,100%{transform:scale(0.6);opacity:0.4;}40%{transform:scale(1);opacity:1;}}
  .orb:not(.thinking) .think-dots{display:none;}.orb.thinking .think-dots{display:flex;}
  .status-label{font-size:12px;font-family:var(--mono);letter-spacing:0.06em;color:var(--text-muted);text-transform:uppercase;height:18px;transition:all 0.3s ease;}
  .status-label.listening{color:var(--teal);}.status-label.speaking{color:var(--accent);}.status-label.thinking{color:#f472b6;}
  .controls{display:flex;gap:12px;align-items:center;}
  .btn{display:flex;align-items:center;gap:8px;padding:0.75rem 1.5rem;border-radius:100px;font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all 0.2s ease;letter-spacing:0.01em;}
  .btn-start{background:linear-gradient(135deg,#7c6af7,#5b49d4);color:white;box-shadow:0 4px 20px rgba(124,106,247,0.35);padding:0.85rem 2rem;}
  .btn-start:hover{transform:translateY(-1px);box-shadow:0 6px 30px rgba(124,106,247,0.5);}
  .btn-start:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none;}
  .btn-stop{background:var(--red-soft);color:var(--red);border:1px solid rgba(248,113,113,0.2);}
  .btn-stop:hover{background:rgba(248,113,113,0.2);}
  .vis-bars{display:flex;align-items:flex-end;gap:3px;height:24px;opacity:0;transition:opacity 0.3s;}
  .vis-bars.active{opacity:1;}
  .vis-bar{width:3px;border-radius:2px;background:var(--accent);animation:vis-anim 1s ease-in-out infinite;}
  .vis-bar:nth-child(odd){background:var(--teal);}
  .vis-bar:nth-child(1){height:6px;}.vis-bar:nth-child(2){height:14px;animation-delay:.1s;}.vis-bar:nth-child(3){height:20px;animation-delay:.2s;}.vis-bar:nth-child(4){height:10px;animation-delay:.3s;}.vis-bar:nth-child(5){height:18px;animation-delay:.4s;}.vis-bar:nth-child(6){height:8px;animation-delay:.5s;}.vis-bar:nth-child(7){height:16px;animation-delay:.6s;}
  @keyframes vis-anim{0%,100%{transform:scaleY(0.3);}50%{transform:scaleY(1);}}
  .footer{font-size:11px;color:rgba(240,240,245,0.2);letter-spacing:0.04em;font-family:var(--mono);}
  .error-toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:rgba(248,113,113,0.15);border:1px solid rgba(248,113,113,0.3);color:var(--red);padding:0.6rem 1.25rem;border-radius:100px;font-size:13px;transition:transform 0.3s ease;z-index:100;white-space:nowrap;}
  .error-toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div class="layout" id="layout">
  <div class="container">
    <div class="header">
      <div class="header-badge"><div class="badge-dot"></div>AI Voice Assistant</div>
      <h1>Talk to <span>Algo</span></h1>
      <p>Press start and speak naturally</p>
    </div>

    <div style="display:flex;flex-direction:column;align-items:center;gap:1rem;">
      <div class="orb-wrapper">
        <div class="orb-ring orb-ring-1"></div><div class="orb-ring orb-ring-2"></div><div class="orb-ring orb-ring-3"></div>
        <div class="orb idle" id="orb">
          <div class="orb-icon">
            <div class="mic-body"></div><div class="mic-stand-arc"></div>
            <div class="mic-stand-line"></div><div class="mic-stand-base"></div>
          </div>
          <div class="orb-waves">
            <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
            <div class="wave-bar"></div><div class="wave-bar"></div>
          </div>
          <div class="think-dots">
            <div class="think-dot"></div><div class="think-dot"></div><div class="think-dot"></div>
          </div>
        </div>
      </div>
      <div class="status-label" id="statusLabel">ready</div>
    </div>

    <div class="transcript-box">
      <div class="transcript-feed" id="transcriptFeed">
        <div class="transcript-placeholder" id="transcriptPlaceholder">Your conversation will appear here...</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-start" id="btnStart" onclick="startSession()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="7" cy="7" r="2.5" fill="currentColor"/>
        </svg>
        Start Session
      </button>
      <button class="btn btn-stop" id="btnStop" onclick="stopSession()" style="display:none;">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <rect x="1" y="1" width="10" height="10" rx="2" fill="currentColor"/>
        </svg>
        End
      </button>
    </div>

    <div class="vis-bars" id="visBars">
      <div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div>
      <div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div>
      <div class="vis-bar"></div>
    </div>

    <div class="footer">algotalks &nbsp;·&nbsp; powered by livekit</div>
  </div>

  <!-- ── result panel ── -->
  <div class="result-panel" id="resultPanel">
    <div class="panel-header">
      <div class="panel-title"><div class="panel-title-dot"></div>Results</div>
      <div class="panel-header-right">
        <div class="panel-status idle" id="panelStatus">idle</div>
        <button class="panel-close" onclick="closePanel()" title="Close">✕</button>
      </div>
    </div>
    <div class="panel-body" id="panelBody">
      <div class="searching-indicator hidden" id="searchingIndicator">
        <div class="s-dot"></div><div class="s-dot"></div><div class="s-dot"></div>
        <span class="s-text">searching...</span>
      </div>
      <div class="panel-empty" id="panelEmpty">
        <div class="panel-empty-icon">🔍</div>
        <div class="panel-empty-text">Results will appear here</div>
      </div>
    </div>
  </div>
</div>

<div class="error-toast" id="errorToast"></div>

<script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
<script>
const BACKEND_URL = "https://7onhu4pk18.execute-api.ap-south-2.amazonaws.com/prod/browser_agent";
const LIVEKIT_URL = "wss://algotalks-tzgefzwa.livekit.cloud";

let room = null;
let pendingLine = { user: null, agent: null };

const layout             = document.getElementById("layout");
const orb                = document.getElementById("orb");
const statusLabel        = document.getElementById("statusLabel");
const btnStart           = document.getElementById("btnStart");
const btnStop            = document.getElementById("btnStop");
const visBars            = document.getElementById("visBars");
const panelBody          = document.getElementById("panelBody");
const panelStatus        = document.getElementById("panelStatus");
const transcriptFeed     = document.getElementById("transcriptFeed");
const searchingIndicator = document.getElementById("searchingIndicator");

// ── panel ─────────────────────────────────────────────────────────────

function openPanel() { layout.classList.add("panel-open"); }
function closePanel() { layout.classList.remove("panel-open"); }

function setSearching(on) {
  searchingIndicator.className = on ? "searching-indicator" : "searching-indicator hidden";
  panelStatus.textContent = on ? "searching" : "done";
  panelStatus.className   = "panel-status " + (on ? "searching" : "done");
  if (on) {
    const empty = document.getElementById("panelEmpty");
    if (empty) empty.remove();
    openPanel();
  }
}

// ── rich result card ──────────────────────────────────────────────────

function renderResult(data) {
  const empty = document.getElementById("panelEmpty");
  if (empty) empty.remove();

  setSearching(false);
  openPanel();

  const card = document.createElement("div");
  card.className = "result-card";

  // ── title ──
  const titleBlock = document.createElement("div");
  titleBlock.className = "rc-title-block";
  titleBlock.innerHTML = `
    <div class="rc-title">
      <div class="rc-title-icon">✦</div>
      <span>${escHtml(data.title || "Results")}</span>
    </div>
  `;
  card.appendChild(titleBlock);

  // ── intro prose ──
  if (data.intro) {
    const intro = document.createElement("div");
    intro.className = "rc-intro";
    intro.textContent = data.intro;
    card.appendChild(intro);
  }

  // ── sections ──
  if (Array.isArray(data.sections)) {
    data.sections.forEach(section => {
      const sec = document.createElement("div");
      sec.className = "rc-section";

      if (section.heading) {
        const h = document.createElement("div");
        h.className = "rc-section-heading";
        h.textContent = section.heading;
        sec.appendChild(h);
      }

      if (Array.isArray(section.points)) {
        section.points.forEach(pt => {
          const row = document.createElement("div");
          row.className = "rc-point";
          row.innerHTML = `
            <span class="rc-point-label">${escHtml(pt.label || "")}</span>
            <span class="rc-point-value">${escHtml(pt.value || "")}</span>
          `;
          sec.appendChild(row);
        });
      }

      card.appendChild(sec);
    });
  }

  // fallback: old flat items format still supported
  if (!data.sections && Array.isArray(data.items)) {
    const sec = document.createElement("div");
    sec.className = "rc-section";
    data.items.forEach(item => {
      const row = document.createElement("div");
      row.className = "rc-point";
      row.innerHTML = `
        <span class="rc-point-label">${escHtml(item.label || "")}</span>
        <span class="rc-point-value">${escHtml(item.value || "")}</span>
      `;
      sec.appendChild(row);
    });
    card.appendChild(sec);
  }

  // ── note ──
  if (data.note) {
    const note = document.createElement("div");
    note.className = "rc-note";
    note.textContent = data.note;
    card.appendChild(note);
  }

  panelBody.appendChild(card);
  panelBody.scrollTop = panelBody.scrollHeight;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// ── transcript ────────────────────────────────────────────────────────

function upsertTranscriptLine(role, text, isFinal) {
  if (!text || !text.trim()) return;
  const ph = document.getElementById("transcriptPlaceholder");
  if (ph) ph.remove();

  if (pendingLine[role]) {
    pendingLine[role].querySelector(".tl-text").textContent = text;
    pendingLine[role].className = `transcript-line ${role} ${isFinal ? "final" : "partial"}`;
    transcriptFeed.scrollTop = transcriptFeed.scrollHeight;
    return;
  }

  const line = document.createElement("div");
  line.className = `transcript-line ${role} ${isFinal ? "final" : "partial"}`;
  line.innerHTML = `
    <span class="tl-role">${role === "user" ? "you" : "algo"}</span>
    <span class="tl-text">${text}</span>
  `;
  transcriptFeed.appendChild(line);
  transcriptFeed.scrollTop = transcriptFeed.scrollHeight;
  pendingLine[role] = line;
}

function endTurn(role) {
  if (pendingLine[role]) {
    pendingLine[role].classList.remove("partial");
    pendingLine[role].classList.add("final");
    pendingLine[role] = null;
  }
}

// ── state ─────────────────────────────────────────────────────────────

function setState(state) {
  orb.className = "orb " + state;
  statusLabel.className = "status-label " + state;
  const labels = { idle:"ready", connecting:"connecting...", connected:"connected", listening:"listening", speaking:"speaking", thinking:"thinking" };
  statusLabel.textContent = labels[state] || state;
  visBars.className = "vis-bars" + (state === "speaking" || state === "listening" ? " active" : "");
}

function showError(msg) {
  const toast = document.getElementById("errorToast");
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 3500);
}

// ── session ───────────────────────────────────────────────────────────

async function startSession() {
  btnStart.disabled = true;
  setState("connecting");
  panelStatus.textContent = "idle";
  panelStatus.className = "panel-status idle";
  searchingIndicator.className = "searching-indicator hidden";
  pendingLine = { user: null, agent: null };

  try {
    const res = await fetch(`${BACKEND_URL}/token`);
    const { token, roomName } = await res.json();

    room = new LivekitClient.Room();

    room.on("participantConnected", (p) => {
      if (p.identity === "voice-bot") {
        setState("connected");
        upsertTranscriptLine("agent", "Connected and ready!", true);
        endTurn("agent");
      }
    });

    room.on("trackSubscribed", (track, pub, participant) => {
      if (track.kind === "audio") {
        const audio = track.attach();
        audio.autoplay = true;
        document.body.appendChild(audio);
      }
    });

    room.on("dataReceived", (payload) => {
      try {
        const data = JSON.parse(new TextDecoder().decode(payload));

        if (data.type === "browser_status") {
          if (data.event === "start") setSearching(true);
          else if (data.event === "done") setSearching(false);
        }

        if (data.type === "transcript") {
          const isFinal = data.is_final !== false;
          upsertTranscriptLine(data.role, data.text, isFinal);
        }

        if (data.type === "result") {
          renderResult(data.data);
        }

      } catch (e) {}
    });

    room.on("activeSpeakersChanged", (speakers) => {
      const agentSpeaking = speakers.some(s => s.identity === "voice-bot");
      const userSpeaking  = speakers.some(s => !s.identity.startsWith("agent-"));

      if (agentSpeaking) {
        setState("speaking");
        endTurn("user");
      } else if (userSpeaking) {
        setState("listening");
        endTurn("agent");
      } else {
        if (orb.className.includes("listening")) { setState("thinking"); endTurn("user"); }
        else if (orb.className.includes("speaking")) { setState("connected"); endTurn("agent"); }
      }
    });

    room.on("disconnected", () => {
      setState("idle");
      btnStart.style.display = "flex";
      btnStop.style.display = "none";
      btnStart.disabled = false;
      searchingIndicator.className = "searching-indicator hidden";
      panelStatus.textContent = "idle";
      panelStatus.className = "panel-status idle";
      endTurn("user"); endTurn("agent");
    });

    await room.connect(LIVEKIT_URL, token);
    await room.localParticipant.setMicrophoneEnabled(true);
    setState("connected");
    btnStart.style.display = "none";
    btnStop.style.display = "flex";

    await fetch(`${BACKEND_URL}/start-agent`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ roomName }),
    });

  } catch (err) {
    showError("Failed to connect. Is the server running?");
    setState("idle");
    btnStart.disabled = false;
  }
}

async function stopSession() {
  if (room) { await room.disconnect(); room = null; }
  setState("idle");
  btnStart.style.display = "flex";
  btnStop.style.display = "none";
  btnStart.disabled = false;
  searchingIndicator.className = "searching-indicator hidden";
  endTurn("user"); endTurn("agent");
}
</script>
